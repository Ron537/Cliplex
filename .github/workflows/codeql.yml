name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan, Monday 06:00 UTC.
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

# Swift CodeQL is slow (~30-40 min on macOS). Collapse rapid pushes / PR updates
# on the same ref to the latest run so a burst of commits doesn't pile up a long
# queue of macOS-minute-heavy runs.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (Swift)
    # Swift analysis must run on macOS and build the package. The CodeQL Swift
    # extractor + query run is slow on cold macOS runners (the build alone can
    # take ~20 min), so allow generous headroom.
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      - name: Build
        run: swift build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:swift"
